name: Scrape SNCT catalog

on:
  schedule:
    # Runs once a day at 03:00 UTC. GitHub Actions schedules use UTC and can
    # be delayed a few minutes at busy times.
    - cron: "0 3 * * *"
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Needed so the workflow can push the updated catalog.json back to the repo.
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: |
          node scraper.js
          node scraper-pages.js

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-${{ github.run_id }}
          path: |
            debug-*.png
            debug-*.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          git diff --quiet --cached || git commit -m "chore: update catalog.json [automated]"
          git push
